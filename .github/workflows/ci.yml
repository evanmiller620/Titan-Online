name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  engine:
    name: Engine — typecheck & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Typecheck engine
        run: pnpm --filter @titan/engine typecheck
      - name: Test engine
        run: pnpm --filter @titan/engine test

  client:
    name: Client — pure-logic typecheck, tests & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      # Pure projection + store logic is fully type-verified in CI (no external
      # types involved). The render/net/ui layers are validated by the build.
      - name: Typecheck client logic
        run: pnpm --filter @titan/client typecheck:logic
      - name: Test client
        run: pnpm --filter @titan/client test
      - name: Build client (smoke)
        run: pnpm --filter @titan/client build
